# ByteTrack — Tuned for ScreenDetect (Stability-Optimized)
# IoU-only matching with aggressive stability settings

tracker_type: bytetrack
track_high_thresh: 0.4       # Higher = only confident detections start tracks (was 0.35)
track_low_thresh: 0.1        # Recovery of briefly lost objects
new_track_thresh: 0.5        # Much higher = far fewer false new tracks (was 0.4)
track_buffer: 90             # 3s at 30fps — keeps lost objects alive longer (was 60)
match_thresh: 0.65           # Stricter IoU matching = fewer ID swaps (was 0.7)
fuse_score: True
